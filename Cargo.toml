[workspace]
members = ["ducky-core", "ducky-cli", "ducky-lsp", "ducky-fmt", "ducky-lint"]
authors = ["Greenstorm5417"]
resolver = "2"

[workspace.dependencies]
regex = "1.10"
lazy_static = "1.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.9.8"
clap = { version = "4.5", features = ["derive"] }
sha2 = "0.10"
hex = "0.4"
anyhow = "1.0"
thiserror = "2.0"
tower-lsp = "0.20"
tokio = { version = "1.36", features = ["full"] }
dashmap = "6.1"
